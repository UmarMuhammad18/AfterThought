<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AfterThought</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="glass-card">
      <div class="brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14" aria-hidden="true">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
          <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
          <line x1="12" y1="19" x2="12" y2="22" />
        </svg>
        AfterThought
      </div>

      <div class="icon-badge" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
      </div>

      <h1 class="title">Extension Access</h1>
      <p class="subtitle">
        Paste your AfterThought access token so the extension can securely upload
        recordings to your account. Generate it from your dashboard settings.
      </p>

      <hr class="divider" />

      <label for="tokenInput" class="field-label">Access token</label>
      <textarea
        id="tokenInput"
        class="token-input"
        rows="3"
        spellcheck="false"
        placeholder="Paste your access token here…"
      ></textarea>

      <button id="saveTokenBtn" class="btn-secondary" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z" />
          <polyline points="17 21 17 13 7 13 7 21" />
          <polyline points="7 3 7 8 15 8" />
        </svg>
        Save token
      </button>

      <a
        id="openSettingsBtn"
        class="link-btn"
        href="#"
        target="_blank"
        rel="noopener noreferrer"
      >
        Open dashboard settings to get a token →
      </a>

      <button id="startBtn" class="btn-primary" type="button">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
          <path d="M7 11V7a5 5 0 0 1 10 0v4" />
        </svg>
        Start recording
      </button>

      <p id="status" class="status" role="status" aria-live="polite"></p>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
