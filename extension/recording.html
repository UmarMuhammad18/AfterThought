<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>AfterThought Recording</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="glass-container">
      <div id="preRecording">
        <h1 class="title">AfterThought</h1>
        <p class="subtitle">Allow microphone access to start recording.</p>
        <button id="confirmBtn" style="margin-top: 16px;">
          Start Recording
        </button>
        <button id="cancelBtn" style="background: transparent; border: 1px solid rgba(255,255,255,0.1); color: #9ca3af; margin-top: 8px;">
          Cancel
        </button>
      </div>

      <div id="recordingControls" style="display: none;">
        <h1 class="title" style="color: #ef4444; display: flex; align-items: center; gap: 8px;">
          <span style="width: 8px; height: 8px; background: #ef4444; border-radius: 50%; box-shadow: 0 0 10px #ef4444;"></span>
          Recording...
        </h1>
        <p class="subtitle">Your meeting is being captured.</p>
        <button id="stopBtn" style="background: rgba(239, 68, 68, 0.15); border-color: rgba(239, 68, 68, 0.3); color: #f87171; margin-top: 16px;">
          Stop Recording
        </button>
      </div>

      <div style="margin-top: 16px;">
        <p id="message"></p>
        <p id="status"></p>
      </div>
    </div>

    <script src="recording.js"></script>
  </body>
</html>
