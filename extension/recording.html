<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AfterThought Recording</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body class="page">
    <div class="glass-card">
      <div class="brand">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14" aria-hidden="true">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
          <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
          <line x1="12" y1="19" x2="12" y2="22" />
        </svg>
        AfterThought
      </div>

      <!-- Pre-recording: permission prompt -->
      <div id="preRecording">
        <div class="icon-badge" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
            <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
            <line x1="12" y1="19" x2="12" y2="22" />
          </svg>
        </div>
        <h1 class="title" style="margin-top: 14px;">Allow microphone access</h1>
        <p class="subtitle" style="margin-top: 8px;">
          AfterThought needs your microphone to capture this meeting&apos;s audio.
          Nothing is recorded until you press start.
        </p>
        <button id="confirmBtn" class="btn-primary" type="button" style="margin-top: 16px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
            <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
            <line x1="12" y1="19" x2="12" y2="22" />
          </svg>
          Start recording
        </button>
        <button id="cancelBtn" class="btn-secondary" type="button" style="margin-top: 10px;">
          Cancel
        </button>
      </div>

      <!-- Active recording state -->
      <div id="recordingControls" style="display: none;">
        <div class="icon-badge danger" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
            <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
            <line x1="12" y1="19" x2="12" y2="22" />
          </svg>
        </div>
        <h1 class="recording-title" style="margin-top: 14px;">
          <span class="pulse-dot"></span>
          Recording…
        </h1>
        <p class="subtitle" style="margin-top: 8px;">Your meeting is being captured.</p>
        <button id="stopBtn" class="btn-danger" type="button" style="margin-top: 16px;">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <rect x="6" y="6" width="12" height="12" rx="2" />
          </svg>
          Stop &amp; upload
        </button>
      </div>

      <!-- Error banner -->
      <div id="errorBanner" class="banner error" role="alert">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="12" />
          <line x1="12" y1="16" x2="12.01" y2="16" />
        </svg>
        <span id="errorText"></span>
      </div>

      <!-- Success banner -->
      <div id="successBanner" class="banner success" role="status">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
          <polyline points="22 4 12 14.01 9 11.01" />
        </svg>
        <span id="successText"></span>
      </div>

      <p id="status" class="status" role="status" aria-live="polite"></p>
    </div>

    <script src="recording.js"></script>
  </body>
</html>
