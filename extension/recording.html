<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>AfterThought Recording</title>
    <style>
      body {
        background: #020617;
        color: #e5e7eb;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        margin: 0;
      }

      .card {
        background: #020617;
        border-radius: 16px;
        border: 1px solid #1f2937;
        padding: 24px;
        width: 360px;
        box-shadow: 0 18px 45px rgba(15, 23, 42, 0.8);
      }

      h1 {
        font-size: 20px;
        margin-bottom: 8px;
      }

      p {
        font-size: 14px;
        opacity: 0.85;
        margin-bottom: 16px;
      }

      button {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: none;
        cursor: pointer;
        font-size: 14px;
        margin-top: 8px;
      }

      #confirmBtn {
        background: #22c55e;
        color: white;
      }

      #confirmBtn:hover {
        background: #16a34a;
      }

      #cancelBtn {
        background: #111827;
        color: #e5e7eb;
        border: 1px solid #374151;
      }

      #cancelBtn:hover {
        background: #020617;
      }

      #stopBtn {
        background: #ef4444;
        color: white;
      }

      #stopBtn:hover {
        background: #b91c1c;
      }

      #status {
        margin-top: 12px;
        font-size: 13px;
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>AfterThought</h1>
      <p id="message">
        Do you want to start recording this meeting?
      </p>

      <div id="preRecording">
        <button id="confirmBtn">Yes, start recording</button>
        <button id="cancelBtn">Cancel</button>
      </div>

      <div id="recordingControls" style="display: none">
        <button id="stopBtn">Stop recording</button>
      </div>

      <p id="status"></p>
    </div>

    <script src="recording.js"></script>
  </body>
</html>
