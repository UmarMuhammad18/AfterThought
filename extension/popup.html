<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>AfterThought</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="glass-container">
      <h1 class="title">AfterThought</h1>
      <p class="subtitle">Ready to record your meeting?</p>

      <label for="tokenInput" class="token-label">Access token</label>
      <textarea
        id="tokenInput"
        class="token-input"
        rows="3"
        placeholder="Paste your AfterThought access token (Settings → Extension access)"
      ></textarea>
      <button id="saveTokenBtn" class="secondary">Save token</button>

      <button id="startBtn">Start recording this tab</button>

      <p id="status"></p>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
